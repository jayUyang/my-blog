<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Blog</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/post.css" />
  <link rel="stylesheet" href="css/dark.css" />
  <!-- Prevent theme flicker -->
  <script>
    (function () {
      var saved = localStorage.getItem("theme");
      var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
</head>
<body>
  <header>
    <div class="container">
      <a href="index.html" class="site-title">My Blog</a>
      <button id="theme-toggle" class="theme-toggle" aria-label="다크 모드로 전환"></button>
    </div>
  </header>

  <main>
    <div class="container">
      <a href="index.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        모든 포스트
      </a>

      <div id="post-header" class="post-header"></div>
      <article id="content" class="prose"></article>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 My Blog</p>
    </div>
  </footer>

  <script src="js/marked.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
